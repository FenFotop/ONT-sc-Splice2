    #--time={resources.runtime}
    #--partition=cpu
    #--job-name={rule}
    #--output=logs/{rule}/{rule}.out
    #--error=logs/{rule}/{rule}.err


default-resources:
  mem_mb: 10000
  runtime: 7200

set-resources:
  split_clusters:
    mem_mb: 50000
  split_clusters_IR:
    mem_mb: 50000
  merge_annotate:
    mem_mb: 50000
  merge_annotate_IR:
    mem_mb: 50000
