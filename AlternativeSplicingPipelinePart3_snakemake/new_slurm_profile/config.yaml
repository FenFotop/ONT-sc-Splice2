use-conda: true
executor: slurm
jobs: 50
local-cores: 1
latency-wait: 60
keep-going: true
rerun-incomplete: true
printshellcmds: true
max-jobs-per-second: 10
max-status-checks-per-second: 1


slurm:
  partition: "cpu"
  jobname: "{rule}.{jobid}"
  output: "logs/{rule}/{rule}.{jobid}.out"
  error:  "logs/{rule}/{rule}.{jobid}.err"
  cpus-per-task: "{threads}"



    #cluster-generic-submit-cmd:
    #sbatch
